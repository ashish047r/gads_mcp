<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Google Ads Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f0f2f5; }
    .login-card {
      max-width: 400px;
      margin: 100px auto;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .login-card .card-header {
      background: #1a73e8;
      color: #fff;
      border-radius: 12px 12px 0 0;
      text-align: center;
      padding: 24px;
    }
    .login-card .card-header h4 { margin: 0; font-weight: 600; }
    .login-card .card-header p  { margin: 4px 0 0; opacity: 0.85; font-size: 0.9rem; }
    .btn-primary { background: #1a73e8; border-color: #1a73e8; }
    .btn-primary:hover { background: #1558b0; border-color: #1558b0; }
  </style>
</head>
<body>
  <div class="login-card card border-0">
    <div class="card-header">
      <h4>📊 Google Ads Dashboard</h4>
      <p>Sign in to view your campaign performance</p>
    </div>
    <div class="card-body p-4">
      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
